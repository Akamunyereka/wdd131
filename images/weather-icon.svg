<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sun -->
  <circle cx="24" cy="20" r="8" fill="url(#sunGradient)"/>
  
  <!-- Sun rays -->
  <line x1="24" y1="8" x2="24" y2="4" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="24" y2="36" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="8" y2="20" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="20" x2="40" y2="20" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="15.5" y1="11.5" x2="12.5" y2="8.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="32.5" y1="28.5" x2="35.5" y2="31.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="32.5" y1="11.5" x2="35.5" y2="8.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="15.5" y1="28.5" x2="12.5" y2="31.5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Cloud -->
  <ellipse cx="36" cy="38" rx="16" ry="12" fill="#E0E0E0"/>
  <ellipse cx="28" cy="42" rx="12" ry="10" fill="#F0F0F0"/>
  <ellipse cx="44" cy="42" rx="12" ry="10" fill="#F0F0F0"/>
  
  <!-- Cloud shadow -->
  <ellipse cx="36" cy="46" rx="18" ry="6" fill="#D0D0D0" opacity="0.3"/>
</svg>
